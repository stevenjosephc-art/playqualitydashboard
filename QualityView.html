<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quality Dashboard</title>
  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <?!= HtmlService.createHtmlOutputFromFile('QualityView_CSS').getContent(); ?>
</head>
<body>
  <div id="app-loader" class="q-loader-overlay">
    <div class="q-spinner"></div>
    <div class="mt-16" style="margin-top: 16px; font-weight: 500; color: var(--apple-gray);">Loading Dashboard...</div>
  </div>

  <div id="quality-root" class="q-container" style="display:none">
    <div class="q-topbar">
      <div class="q-page-title">
        <div class="q-icon-badge">
          <i class="ph-bold ph-chart-line-up" style="color: white; font-size: 20px;"></i>
        </div>
        Quality Dashboard
      </div>
      <div class="q-controls" style="display: flex; gap: 12px; align-items: center;">
        <select id="quality-month-picker" class="q-pill-select" onchange="onMonthChange(this.value)">
          <option value="">Loading...</option>
        </select>
        <button class="refresh-btn" onclick="forceRefresh()" title="Force Refresh Data">
          <i class="ph-bold ph-arrows-clockwise"></i>
        </button>
      </div>
    </div>

    <div class="q-tab-row">
      <div class="q-tab active" id="tab-agent" onclick="switchTab('agent')">
        <i class="ph ph-user q-tab-icon"></i>
        <span>Agent Scores</span>
      </div>
      <div class="q-tab" id="tab-team" onclick="switchTab('team')">
        <i class="ph ph-users q-tab-icon"></i>
        <span>Team Scores</span>
      </div>
      <div class="q-tab" id="tab-cluster" onclick="switchTab('cluster')">
        <i class="ph ph-buildings q-tab-icon"></i>
        <span>Cluster Scores</span>
      </div>
    </div>

    <!-- Selectors -->
    <div class="q-card" style="margin-bottom: 24px;">
      <!-- Agent Selector -->
      <div id="selector-agent">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: end;">
          <div>
            <div class="stat-label" style="margin-bottom: 8px;">LOB</div>
            <select id="lob-select" class="q-pill-select" style="width: 100%;" onchange="onLobChange(this.value)">
              <option value="">Select LOB...</option>
            </select>
          </div>
          <div>
            <div class="stat-label" style="margin-bottom: 8px;">Supervisor</div>
            <select id="agent-sup-select" class="q-pill-select" style="width: 100%;" onchange="onAgentSupChange(this.value)" disabled>
              <option value="">Select Supervisor...</option>
            </select>
          </div>
          <div style="position: relative;">
            <div class="stat-label" style="margin-bottom: 8px;">Agent LDAP</div>
            <div class="q-search-container">
              <i class="ph ph-magnifying-glass q-search-icon"></i>
              <input type="text" id="ldap-search-input" class="q-search-input" placeholder="Search Agent..." autocomplete="off">
              <div id="ldap-autocomplete-list" class="q-autocomplete-list" style="display: none;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Team Selector -->
      <div id="selector-team" style="display:none">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: end;">
          <div>
            <div class="stat-label" style="margin-bottom: 8px;">LOB</div>
            <select id="team-lob-select" class="q-pill-select" style="width: 100%;" onchange="onTeamLobChange(this.value)">
              <option value="">Select LOB...</option>
            </select>
          </div>
          <div>
            <div class="stat-label" style="margin-bottom: 8px;">Supervisor (Team)</div>
            <select id="team-sup-select" class="q-pill-select" style="width: 100%;" onchange="onTeamSupChange(this.value)" disabled>
              <option value="">Select Supervisor...</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Cluster Selector -->
      <div id="selector-cluster" style="display:none">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: end;">
          <div>
            <div class="stat-label" style="margin-bottom: 8px;">Manager</div>
            <select id="mgr-select" class="q-pill-select" style="width: 100%;" onchange="onMgrChange(this.value)">
              <option value="">Select Manager...</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div id="view-content"></div>
  </div>

  <?!= HtmlService.createHtmlOutputFromFile('QualityView_JS').getContent(); ?>
</body>
</html>
