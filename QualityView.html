<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quality Dashboard</title>
  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <?!= HtmlService.createHtmlOutputFromFile('QualityView_CSS').getContent(); ?>
</head>
<body class="apple-style">
  <div id="app-loader" class="q-loader-overlay">
    <div class="q-spinner"></div>
    <div class="loader-text">Initializing Dashboard...</div>
  </div>

  <div id="quality-root" class="app-layout" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="app-logo">
          <i class="ph-fill ph-chart-pie-slice"></i>
        </div>
        <div class="app-name">QualityOS</div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group">
          <div class="nav-item active" id="nav-agent" onclick="switchTab('agent')">
            <i class="ph ph-user"></i>
            <span>Agent Scores</span>
          </div>
          <div class="nav-item" id="nav-team" onclick="switchTab('team')">
            <i class="ph ph-users"></i>
            <span>Team Scores</span>
          </div>
          <div class="nav-item" id="nav-cluster" onclick="switchTab('cluster')">
            <i class="ph ph-buildings"></i>
            <span>Cluster Scores</span>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar" id="user-initials">--</div>
          <div class="user-info">
            <div class="user-name" id="user-ldap">User</div>
            <div class="user-role">Quality Dashboard</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="content-header">
        <div class="header-left">
          <h1 id="page-title">Agent Performance</h1>
          <p id="page-subtitle">Personal Quality Score Overview</p>
        </div>
        <div class="header-right">
          <div class="control-group">
            <div class="select-wrapper">
              <i class="ph ph-calendar-blank"></i>
              <select id="quality-month-picker" onchange="onMonthChange(this.value)">
                <option value="">Loading...</option>
              </select>
            </div>
            <button class="icon-button refresh-btn" onclick="forceRefresh()" title="Refresh Data">
              <i class="ph ph-arrows-clockwise"></i>
            </button>
          </div>
        </div>
      </header>

      <div class="scroll-container">
        <!-- Selectors Section -->
        <section class="selectors-section" id="selectors-container">
          <!-- Agent Selectors -->
          <div id="selector-agent" class="selector-row">
            <div class="input-group search-group grid-span-4">
              <label>Agent LDAP</label>
              <div class="search-input-wrapper">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="ldap-search-input" placeholder="Enter LDAP (e.g. anggam) and press enter or select from list..." autocomplete="off">
                <div id="ldap-autocomplete-list" class="autocomplete-dropdown"></div>
              </div>
            </div>
          </div>

          <!-- Team Selectors -->
          <div id="selector-team" class="selector-row" style="display:none">
             <div class="input-group">
                <label>LOB</label>
                <select id="team-lob-select" onchange="onTeamLobChange(this.value)">
                   <option value="">Select LOB...</option>
                </select>
             </div>
             <div class="input-group">
                <label>Supervisor</label>
                <select id="team-sup-select" onchange="onTeamSupChange(this.value)" disabled>
                   <option value="">Select Supervisor...</option>
                </select>
             </div>
          </div>

          <!-- Cluster Selectors -->
          <div id="selector-cluster" class="selector-row" style="display:none">
             <div class="input-group">
                <label>Manager</label>
                <select id="mgr-select" onchange="onMgrChange(this.value)">
                   <option value="">Select Manager...</option>
                </select>
             </div>
          </div>
        </section>

        <!-- Dashboard Content -->
        <div id="view-content" class="dashboard-grid">
           <!-- Dynamic Content Loads Here -->
        </div>
      </div>
    </main>
  </div>

  <?!= HtmlService.createHtmlOutputFromFile('QualityView_JS').getContent(); ?>
</body>
</html>
