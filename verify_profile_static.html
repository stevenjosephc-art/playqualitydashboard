<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --apple-blue: #007AFF;
      --apple-green: #34C759;
      --apple-red: #FF3B30;
      --apple-orange: #FF9500;
      --apple-gray: #8E8E93;
      --apple-light-gray: #F2F2F7;
      --apple-bg: #F5F5F7;
      --card-bg: rgba(255, 255, 255, 0.8);
      --glass-border: 1px solid rgba(255, 255, 255, 0.3);
      --text-primary: #1D1D1F;
      --text-secondary: #86868B;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    }
    body { font-family: 'Inter', sans-serif; background: var(--apple-bg); padding: 40px; }

    .selectors-section {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      border: var(--glass-border);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
    }

    .input-group { display: flex; flex-direction: column; gap: 8px; width: 300px; }
    .input-group label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .search-input-wrapper { position: relative; }
    .search-input-wrapper input { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.05); border-radius: 10px; padding: 12px; width: 100%; font-size: 14px; }

    .agent-profile-info {
      display: flex;
      gap: 32px;
      padding-left: 32px;
      border-left: 1px solid #E5E5E7;
      align-items: center;
      flex: 1;
    }

    .profile-card-main {
      display: flex;
      align-items: center;
      gap: 32px;
      width: 100%;
    }

    .agent-profile-img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 8px 16px rgba(0,0,0,0.08);
      background: var(--apple-light-gray);
    }

    .profile-meta-grid {
      display: flex;
      gap: 48px;
      flex: 1;
    }

    .profile-meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .profile-meta-label {
      font-size: 11px;
      font-weight: 700;
      color: #86868B;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .profile-meta-value {
      font-size: 16px;
      font-weight: 600;
      color: #1D1D1F;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="selectors-section">
    <div class="input-group">
      <label>Agent LDAP</label>
      <div class="search-input-wrapper">
        <input type="text" value="jamessevilla">
      </div>
    </div>
    <div class="agent-profile-info">
      <div class="profile-card-main">
          <div class="profile-img-container">
              <img src="https://moma-teams-photos.corp.google.com/photos/jamessevilla?sz=600&type=PLUS" class="agent-profile-img">
          </div>
          <div class="profile-meta-grid">
              <div class="profile-meta-item">
                  <span class="profile-meta-label">Supervisor</span>
                  <span class="profile-meta-value">jamessevilla</span>
              </div>
              <div class="profile-meta-item">
                  <span class="profile-meta-label">Team</span>
                  <span class="profile-meta-value">Team James</span>
              </div>
              <div class="profile-meta-item">
                  <span class="profile-meta-label">LOB</span>
                  <span class="profile-meta-value">Play</span>
              </div>
          </div>
      </div>
    </div>
  </div>
</body>
</html>
