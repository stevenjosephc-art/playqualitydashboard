<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
          --apple-blue: #007AFF;
          --apple-green: #34C759;
          --apple-red: #FF3B30;
          --apple-orange: #FF9500;
          --apple-gray: #8E8E93;
          --apple-light-gray: #F2F2F7;
          --apple-bg: #F5F5F7;
          --card-bg: rgba(255, 255, 255, 0.8);
          --glass-border: 1px solid rgba(255, 255, 255, 0.3);
          --text-primary: #1D1D1F;
          --text-secondary: #86868B;
          --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
          --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--apple-bg);
            padding: 40px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: var(--glass-border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }

        /* Profile Styles */
        .agent-profile-info {
          display: flex;
          gap: 32px;
          align-items: center;
        }

        .profile-card-main {
          display: flex;
          align-items: center;
          gap: 32px;
          width: 100%;
        }

        .agent-profile-img {
          width: 72px;
          height: 72px;
          border-radius: 50%;
          object-fit: cover;
          border: 4px solid white;
          box-shadow: 0 8px 16px rgba(0,0,0,0.08);
          background: var(--apple-light-gray);
        }

        .profile-meta-grid {
          display: flex;
          gap: 48px;
          flex: 1;
        }

        .profile-meta-item {
          display: flex;
          flex-direction: column;
          gap: 4px;
        }

        .profile-meta-label {
          font-size: 11px;
          font-weight: 700;
          color: #86868B;
          text-transform: uppercase;
          letter-spacing: 0.05em;
        }

        .profile-meta-value {
          font-size: 16px;
          font-weight: 600;
          color: #1D1D1F;
          white-space: nowrap;
        }

        /* Case Card Styles */
        .case-summary {
          display: grid;
          grid-template-columns: 2fr 1fr 1fr 1fr 4fr 100px;
          align-items: center;
        }

        .case-id-group {
          display: flex;
          flex-direction: column;
        }

        .case-id-link {
          font-size: 14px;
          font-weight: 700;
          color: var(--apple-blue);
          display: flex;
          align-items: center;
          gap: 4px;
          text-decoration: none;
          transition: opacity 0.2s;
        }

        .case-id-link:hover {
          text-decoration: underline;
          opacity: 0.8;
        }

        .case-date {
          font-size: 11px;
          color: var(--text-secondary);
          margin-top: 4px;
        }

        .case-status-icon { font-size: 20px; }
        .case-status-icon.pass { color: var(--apple-green); }
        .case-status-icon.fail { color: var(--apple-red); }

        .perfect-audit-text {
          color: var(--apple-green);
          font-weight: 700;
          font-size: 13px;
          display: flex;
          align-items: center;
          gap: 4px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>Profile Card Refinement</h3>
        <div class="agent-profile-info">
            <div class="profile-card-main">
                <div class="profile-img-container">
                    <!-- Demonstrating with a non-existent URL to trigger fallback to UI Avatars -->
                    <img id="test-img" src="https://non-existent-image-url.com/photo.jpg" class="agent-profile-img">
                </div>
                <div class="profile-meta-grid">
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">Supervisor</span>
                        <span class="profile-meta-value">jdoe-sup</span>
                    </div>
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">Team</span>
                        <span class="profile-meta-value">The A-Team</span>
                    </div>
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">LOB</span>
                        <span class="profile-meta-value">Hardware Support</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Case ID Hyperlink Enhancement</h3>
        <div class="case-summary">
            <div class="case-id-group">
                <div style="display:flex; align-items:center; gap: 4px;">
                    <i class="ph ph-file-text" style="color: var(--apple-blue); font-size: 16px; margin-right: 4px;"></i>
                    <a href="https://cases.connect.corp.google.com/12345678" target="_blank" class="case-id-link">
                        12345678 <i class="ph ph-arrow-square-out" style="font-size: 11px;"></i>
                    </a>
                    <i class="ph ph-copy" style="cursor:pointer; color: var(--text-secondary); font-size:13px; margin-left: 2px;" title="Copy Case ID"></i>
                </div>
                <span class="case-date">2026-05-15</span>
            </div>
            <div class="case-status-icon pass">
                <i class="ph-fill ph-check-circle"></i>
            </div>
            <div class="case-status-icon pass">
                <i class="ph-fill ph-check-circle"></i>
            </div>
            <div class="case-status-icon pass">
                <i class="ph-fill ph-check-circle"></i>
            </div>
            <div>
                <span class="perfect-audit-text"><i class="ph-fill ph-seal-check"></i> Perfect Audit!</span>
            </div>
        </div>
    </div>

    <script>
        const ldap = 'jdoe';
        const fallbackChain = [
            `https://non-existent-1.com/photo.jpg`,
            `https://non-existent-2.com/photo.jpg`,
            `https://ui-avatars.com/api/?name=${ldap}&background=007AFF&color=fff&size=120`
        ];

        function handleImgError(img, chain) {
            let currentSrc = img.src;
            let index = chain.indexOf(currentSrc);
            if (index === -1) {
                index = chain.findIndex(url => currentSrc.includes(url.split('?')[0]));
            }

            if (index < chain.length - 1) {
                console.log('Falling back to:', chain[index + 1]);
                img.src = chain[index + 1];
            } else {
                img.onerror = null;
            }
        }

        const testImg = document.getElementById('test-img');
        testImg.onerror = () => handleImgError(testImg, fallbackChain);
        // Trigger error by setting initial src if it's already broken or wait for browser
    </script>
</body>
</html>
