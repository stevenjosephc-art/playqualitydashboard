<script>
// State Management
const State = {
  initialData: null,
  currentTab: 'agent',
  trendView: 'weekly',
  auditFilter: 'all',
  selectedMonth: '',
  selectedLdap: '',
  selectedSup: '',
  selectedMgr: '',
  selectedLob: '',
  filteredData: null,
  loading: false
};

// Initialization
document.addEventListener('DOMContentLoaded', () => {
  initApp();
});

async function initApp(forceRefresh = false) {
  showLoader(true);
  console.log('QualityOS: Booting...');

  const root = document.getElementById('quality-root');
  if (root) {
      root.style.display = 'flex';
      root.style.opacity = '0.3';
  }

  try {
    let data = null;
    if (!forceRefresh) {
        try {
            const cached = sessionStorage.getItem('q_initial_data');
            if (cached) {
                data = JSON.parse(cached);
                console.log('QualityOS: Loaded Initial Data from Session Cache');
            }
        } catch (e) { console.warn('sessionStorage access denied', e); }
    }

    if (!data) {
        data = await callServer('clientGetInitialData', [forceRefresh]);
        console.log('QualityOS: Initial Data Received from Server', data);
        if (data) {
            try { sessionStorage.setItem('q_initial_data', JSON.stringify(data)); } catch (e) {}
        }
    }

    if (!data) throw new Error("Server returned empty data. Check sheet connectivity.");
    State.initialData = data;

    // UI Setup
    if (data.session) updateUserInfo(data.session);

    if (!State.selectedMonth && data.months && data.months.length > 0) {
      State.selectedMonth = data.months[0];
    }
    if (data.session) State.selectedLdap = data.session.ldap;

    if (data.months) populateMonthPicker();
    if (data.hierarchy) populateLobPicker();
    if (data.managers) populateMgrPicker();
    setupLDAPAutocomplete();

    // Reveal Dashboard
    if (root) {
        root.style.opacity = '1';
        root.classList.add('fade-in');
        console.log('QualityOS: Root displayed.');
    }

    await fetchData(forceRefresh);

  } catch (e) {
    console.error('QualityOS Error:', e);
    if (root) {
        root.style.opacity = '1';
    }
    const content = document.getElementById('view-content');
    if (content) {
        content.innerHTML = `
            <div class="card grid-span-4" style="text-align:center; padding: 60px;">
                <i class="ph ph-warning-octagon" style="font-size: 48px; color: var(--apple-red);"></i>
                <h3>Initialization Failed</h3>
                <p style="color: var(--text-secondary); margin: 10px 0 20px;">${e.message}</p>
                <button class="icon-button" onclick="initApp(true)" style="margin: 0 auto; width: auto; padding: 0 20px;">
                    <i class="ph ph-arrows-clockwise"></i> Try Again
                </button>
            </div>
        `;
    } else {
        alert('Dashboard Overhaul Error: ' + e.message);
    }
  } finally {
    showLoader(false);
  }
}

function updateUserInfo(session) {
    if (!session) return;
    const nameEl = document.getElementById('user-ldap');
    const initEl = document.getElementById('user-initials');
    if (nameEl) nameEl.textContent = session.ldap || 'User';
    if (initEl && session.ldap) initEl.textContent = session.ldap.substring(0, 2).toUpperCase();
}

// UI Handlers
function populateMonthPicker() {
  const picker = document.getElementById('quality-month-picker');
  if (!picker || !State.initialData || !State.initialData.months) return;
  picker.innerHTML = State.initialData.months.map(m =>
    `<option value="${m}" ${m === State.selectedMonth ? 'selected' : ''}>${m}</option>`
  ).join('');
}

function populateLobPicker() {
  const lobSelect = document.getElementById('lob-select');
  const teamLobSelect = document.getElementById('team-lob-select');
  if (!State.initialData || !State.initialData.hierarchy) return;

  const lobs = Object.keys(State.initialData.hierarchy);
  const options = '<option value="">Select LOB...</option>' +
    lobs.map(l => `<option value="${l}">${l}</option>`).join('');

  if (lobSelect) lobSelect.innerHTML = options;
  if (teamLobSelect) teamLobSelect.innerHTML = options;
}

function populateMgrPicker() {
  const mgrSelect = document.getElementById('mgr-select');
  if (!mgrSelect || !State.initialData || !State.initialData.managers) return;

  mgrSelect.innerHTML = '<option value="">Select Manager...</option>' +
    State.initialData.managers.map(m => `<option value="${m}">${m}</option>`).join('');
}

function onMonthChange(val) {
  State.selectedMonth = val;
  fetchData();
}

function onLobChange(val) {
  State.selectedLob = val;
}

function onAgentSupChange(val) {
  State.selectedSup = val;
}

function onTeamLobChange(val) {
  State.selectedLob = val;
  const supSelect = document.getElementById('team-sup-select');
  if (val && State.initialData.hierarchy[val]) {
    const sups = Object.keys(State.initialData.hierarchy[val]);
    if (supSelect) {
        supSelect.innerHTML = '<option value="">Select Supervisor...</option>' +
          sups.map(s => `<option value="${s}">${s}</option>`).join('');
        supSelect.disabled = false;
    }
  } else if (supSelect) {
    supSelect.innerHTML = '<option value="">Select Supervisor...</option>';
    supSelect.disabled = true;
  }
}

function onTeamSupChange(val) {
  State.selectedSup = val;
  fetchData();
}

function onMgrChange(val) {
  State.selectedMgr = val;
  fetchData();
}

function setupLDAPAutocomplete() {
  const input = document.getElementById('ldap-search-input');
  const list = document.getElementById('ldap-autocomplete-list');

  if (!input || !list) return;

  const allAgents = getAllAgentsFromHierarchy();

  input.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase();
    list.innerHTML = '';
    if (!val) {
      list.style.display = 'none';
      return;
    }

    const matches = allAgents.filter(a => a.toLowerCase().includes(val)).slice(0, 10);
    if (matches.length > 0) {
      matches.forEach(m => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.textContent = m;
        item.onclick = () => {
          input.value = m;
          list.style.display = 'none';
          State.selectedLdap = m;
          fetchData();
        };
        list.appendChild(item);
      });
      list.style.display = 'block';
    } else {
      list.style.display = 'none';
    }
  });

  document.addEventListener('click', (e) => {
    if (e.target !== input) list.style.display = 'none';
  });
}

function getAllAgentsFromHierarchy() {
  const agents = new Set();
  if (!State.initialData || !State.initialData.hierarchy) return [];
  const h = State.initialData.hierarchy;
  for (const lob in h) {
    for (const sup in h[lob]) {
      if (Array.isArray(h[lob][sup])) {
          h[lob][sup].forEach(a => agents.add(a));
      }
    }
  }
  return Array.from(agents).sort();
}

async function fetchData(forceRefresh = false) {
  if (State.loading) return;
  State.loading = true;

  const content = document.getElementById('view-content');
  if (content) {
    content.innerHTML = '<div class="grid-span-4" style="text-align:center; padding: 100px;"><div class="q-spinner" style="margin: 0 auto;"></div></div>';
  }

  try {
    let result;
    if (State.currentTab === 'agent') {
      if (!State.selectedLdap) throw new Error("Please select an agent.");
      result = await callServer('clientGetMyQuality', [State.selectedLdap, State.selectedMonth, forceRefresh]);
    } else if (State.currentTab === 'team') {
      if (!State.selectedSup) throw new Error("Please select a supervisor.");
      result = await callServer('clientGetTeamQuality', [State.selectedSup, State.selectedMonth, forceRefresh]);
    } else if (State.currentTab === 'cluster') {
      if (!State.selectedMgr) throw new Error("Please select a manager.");
      result = await callServer('clientGetClusterQuality', [State.selectedMgr, State.selectedMonth, forceRefresh]);
    }

    State.filteredData = result;
    renderView();
  } catch (e) {
    console.error('Fetch Error:', e);
    if (content) {
        content.innerHTML = `<div class="card grid-span-4" style="text-align:center; color: var(--apple-red);">Oops! ${e.message}</div>`;
    }
  } finally {
    State.loading = false;
  }
}

function renderProfileInfo(data) {
    const wrapper = document.getElementById('selector-agent');
    if (!wrapper) return;

    // Remove old profile info if exists
    const old = wrapper.querySelector('.agent-profile-info');
    if (old) old.remove();

    if (data && data.hasData && data.metadata) {
        const m = data.metadata;
        const info = document.createElement('div');
        info.className = 'agent-profile-info fade-in';

        const ldap = State.selectedLdap || '';
        // Image logic: try PLUS first, then CUSTOM
        const imgUrl = `https://moma-teams-photos.corp.google.com/photos/${ldap}?sz=600&type=PLUS`;
        const fallbackUrl = `https://moma-teams-photos.corp.google.com/photos/${ldap}?sz=600&type=CUSTOM`;

        info.innerHTML = `
            <div class="profile-card-main">
                <div class="profile-img-container">
                    <img src="${imgUrl}" class="agent-profile-img" onerror="this.onerror=null;this.src='${fallbackUrl}';">
                </div>
                <div class="profile-meta-grid">
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">Supervisor</span>
                        <span class="profile-meta-value">${m.supervisor || 'N/A'}</span>
                    </div>
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">Team</span>
                        <span class="profile-meta-value">${m.team || 'N/A'}</span>
                    </div>
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">LOB</span>
                        <span class="profile-meta-value">${m.lob || 'N/A'}</span>
                    </div>
                </div>
            </div>
        `;
        wrapper.appendChild(info);

        // Adjust grid span to make room
        const searchGroup = wrapper.querySelector('.search-group');
        if (searchGroup) searchGroup.className = 'input-group search-group grid-span-2';
    } else {
        const searchGroup = wrapper.querySelector('.search-group');
        if (searchGroup) searchGroup.className = 'input-group search-group grid-span-4';
    }
}

function renderView() {
  if (State.currentTab === 'agent') {
    renderAgentView();
  } else if (State.currentTab === 'team') {
    renderTeamView();
  } else if (State.currentTab === 'cluster') {
    renderClusterView();
  }
}

function renderAgentView() {
  const data = State.filteredData;
  renderProfileInfo(data);
  const container = document.getElementById('view-content');
  if (!container) return;

  if (!data || !data.hasData) {
    container.innerHTML = `
      <div class="card grid-span-4" style="text-align:center; padding: 80px;">
        <i class="ph ph-mask-sad" style="font-size: 64px; color: var(--apple-gray); margin-bottom: 20px; display:block;"></i>
        <div style="font-size: 20px; font-weight: 700;">No Data Found</div>
        <div style="color: var(--text-secondary); margin-top: 8px;">We couldn't find any audits for ${State.selectedLdap} in ${State.selectedMonth}</div>
      </div>
    `;
    return;
  }

  const s = data.stats;

  container.innerHTML = `
    <!-- Top Opportunities -->
    ${renderTopOpportunities(s.groupedParams)}

    <!-- Top Level Cards -->
    <div class="card">
      <div class="card-title">Total Audits</div>
      <div class="score-value">${s.count}</div>
      <div class="trend-badge trend-up"><i class="ph ph-trend-up"></i> ${State.selectedMonth}</div>
    </div>
    ${renderPremiumScoreCard('Customer Critical', s.customer || 0, s.targets.CUSTOMER)}
    ${renderPremiumScoreCard('Business Critical', s.business || 0, s.targets.BUSINESS)}
    ${renderPremiumScoreCard('Compliance Critical', s.compliance || 0, s.targets.COMPLIANCE)}

    <!-- Graphs -->
    <div class="card grid-span-3">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <div class="card-title" style="margin:0;">Performance Trends</div>
            <div class="segmented-control">
                <button class="control-btn ${State.trendView === 'daily' ? 'active' : ''}" onclick="toggleTrendView('daily')">Daily</button>
                <button class="control-btn ${State.trendView === 'weekly' ? 'active' : ''}" onclick="toggleTrendView('weekly')">Weekly</button>
            </div>
        </div>
        <div id="chart-trends" style="height: 350px;"></div>
    </div>

    <div class="card">
        <div class="card-title">Distribution</div>
        <div id="chart-radar" style="height: 350px;"></div>
    </div>

    <!-- Parameter Breakdown -->
    <div class="card grid-span-4">
        <div class="card-title">Detailed Parameter Performance</div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;">
            ${renderParamGroup('Customer', s.groupedParams.customer)}
            ${renderParamGroup('Business', s.groupedParams.business)}
            ${renderParamGroup('Compliance', s.groupedParams.compliance)}
        </div>
    </div>

    <!-- Case Breakdown -->
    <div class="card grid-span-4">
        <div class="audit-breakdown-header">
            <div class="audit-breakdown-title">Case Lookup & Audit Details</div>
            <div class="audit-filters">
                <div class="search-cases-wrapper">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="audit-search-input" placeholder="Search cases or comments..." oninput="filterCaseList()">
                </div>
                <div class="segmented-control">
                    <button class="control-btn ${State.auditFilter === 'all' ? 'active' : ''}" id="filter-all" onclick="setAuditFilter('all')">All</button>
                    <button class="control-btn ${State.auditFilter === 'perfect' ? 'active' : ''}" id="filter-perfect" onclick="setAuditFilter('perfect')">Perfect</button>
                    <button class="control-btn ${State.auditFilter === 'markdowns' ? 'active' : ''}" id="filter-markdowns" onclick="setAuditFilter('markdowns')">Markdowns</button>
                </div>
            </div>
        </div>
        <div class="case-list">
            <div class="case-list-header">
                <div>CASE ID</div>
                <div>CUST</div>
                <div>BUS</div>
                <div>COMP</div>
                <div>MARKDOWNS</div>
                <div style="text-align:right;">ACTION</div>
            </div>
            <div id="case-list-container">
                ${data.caseLog.map((c, i) => renderCaseCard(c, i)).join('')}
            </div>
        </div>
    </div>
  `;

  renderCharts(data);
}

function parseScore(val) {
    if (typeof val === 'number') return val;
    if (val === null || val === undefined || val === '') return 0;
    let s = String(val).replace('%', '').trim();
    let n = parseFloat(s);
    return isNaN(n) ? 0 : n;
}

function renderCaseCard(c, index) {
    const custScore = parseScore(c.customer);
    const busScore = parseScore(c.business);
    const compScore = parseScore(c.compliance);

    const isScorePass = (s) => (s >= 99.9 || (s >= 0.999 && s <= 1.1));

    const tags = [];
    const catMap = { 'customer': { label: 'Cust', class: 'cust' }, 'business': { label: 'Bus', class: 'bus' }, 'compliance': { label: 'Comp', class: 'comp' } };

    for (const cat in c.details) {
        let catHasMarkdown = false;
        for (const param in c.details[cat]) {
            const val = String(c.details[cat][param]).toLowerCase().trim();
            if (val === 'no' || val === '0' || val === 'fail') {
                const info = catMap[cat] || { label: cat, class: 'gray' };
                tags.push(`<span class="markdown-tag tag-${info.class}">${info.label}: ${param.replace(/_/g, ' ')}</span>`);
                catHasMarkdown = true;
            }
        }

        // Quality Improvement: If the critical score failed but no specific parameters were marked, add a generic Critical fail tag
        const s = (cat === 'customer') ? custScore : (cat === 'business' ? busScore : compScore);
        if (!isScorePass(s) && !catHasMarkdown) {
            const info = catMap[cat] || { label: cat, class: 'gray' };
            tags.push(`<span class="markdown-tag tag-${info.class}" style="background: var(--apple-red); color: white;">Critical ${info.label} Fail</span>`);
        }
    }

    // A perfect audit must have 100% in all critical scores AND no markdown tags
    const isPerfectAudit = isScorePass(custScore) && isScorePass(busScore) && isScorePass(compScore) && (tags.length === 0);

    let markdownsHtml = '';
    if (isPerfectAudit) {
        markdownsHtml = '<span class="perfect-audit-text" style="color: var(--apple-green); font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 4px;"><i class="ph-fill ph-seal-check"></i> Perfect Audit!</span>';
    } else if (tags.length === 0) {
        // Fallback for cases where scores might be slightly off but no tags exist
        markdownsHtml = '<span style="color: var(--text-secondary); font-size: 12px; font-style: italic;">No specific markdowns</span>';
    } else {
        markdownsHtml = `<div class="markdown-tags">${tags.join('')}</div>`;
    }

    const escapedComments = (c.comments || '').replace(/"/g, '&quot;').toLowerCase();

    return `
        <div class="case-card" data-perfect="${isPerfectAudit}" data-markdown="${!isPerfectAudit}" data-comments="${escapedComments}">
            <div class="case-summary">
                <div class="case-id-group">
                    <div style="display:flex; align-items:center; gap: 8px;">
                        <i class="ph ph-file-text" style="color: var(--apple-blue); font-size: 16px;"></i>
                        <a href="https://cases.connect.corp.google.com/${c.caseId}" target="_blank" class="case-id-link">
                            ${c.caseId || 'UNKNOWN'} <i class="ph ph-arrow-square-out" style="font-size: 10px;"></i>
                        </a>
                        <i class="ph ph-copy" style="cursor:pointer; color: var(--text-secondary); font-size:14px;" onclick="copyToClipboard('${c.caseId}')" title="Copy Case ID"></i>
                    </div>
                    <span class="case-date">${c.reviewDate}</span>
                </div>
                <div class="case-status-icon ${(custScore >= 95 || (custScore >= 0.95 && custScore <= 1.1)) ? 'pass' : 'fail'}">
                    <i class="ph-fill ${(custScore >= 95 || (custScore >= 0.95 && custScore <= 1.1)) ? 'ph-check-circle' : 'ph-x-circle'}"></i>
                </div>
                <div class="case-status-icon ${(busScore >= 90 || (busScore >= 0.90 && busScore <= 1.1)) ? 'pass' : 'fail'}">
                    <i class="ph-fill ${(busScore >= 90 || (busScore >= 0.90 && busScore <= 1.1)) ? 'ph-check-circle' : 'ph-x-circle'}"></i>
                </div>
                <div class="case-status-icon ${(compScore >= 99.5 || (compScore >= 0.995 && compScore <= 1.1)) ? 'pass' : 'fail'}">
                    <i class="ph-fill ${(compScore >= 99.5 || (compScore >= 0.995 && compScore <= 1.1)) ? 'ph-check-circle' : 'ph-x-circle'}"></i>
                </div>
                <div>${markdownsHtml}</div>
                <div style="text-align:right; display:flex; gap:8px; justify-content: flex-end;">
                    <button class="icon-button" style="width:32px; height:32px;" onclick="copyMarkdownSummary(${index})" title="Copy Markdown Summary">
                        <i class="ph ph-share-network"></i>
                    </button>
                    <button class="details-btn" onclick="toggleCaseDetails(${index})">Details</button>
                </div>
            </div>
            <div class="case-details-expanded" id="details-${index}">
                <div class="reviewer-comments-box">
                    <div class="reviewer-comments-title">Reviewer Comments:</div>
                    <div class="reviewer-comments-text">"${c.comments || 'No comments'}"</div>
                </div>
                <div class="params-details-grid">
                    ${renderParamDetailsCol('CUSTOMER', c.details.customer, 'cust')}
                    ${renderParamDetailsCol('BUSINESS', c.details.business, 'bus')}
                    ${renderParamDetailsCol('COMPLIANCE', c.details.compliance, 'comp')}
                </div>
            </div>
        </div>
    `;
}

function renderParamDetailsCol(title, params, classSuffix) {
    let rows = '';
    const sortedKeys = Object.keys(params).sort();
    for (const p of sortedKeys) {
        const val = String(params[p]).toLowerCase();
        // If it is truly empty/null from the sheet, we can show it as N/A or skip
        // But let's show all available parameters to match user screenshot
        if (val === 'undefined') continue;

        const isPass = val === 'yes' || val === '1' || val === 'pass';
        const isFail = val === 'no' || val === '0' || val === 'fail';
        const displayVal = isPass ? 'PASS' : (isFail ? 'FAIL' : 'N/A');
        const colorClass = isPass ? 'pass' : (isFail ? 'fail' : 'neutral');

        rows += `
            <div class="param-row">
                <span class="param-label">${p.replace(/_/g, ' ').toLowerCase()}</span>
                <span class="param-val ${colorClass}">${displayVal}</span>
            </div>
        `;
    }
    return `
        <div>
            <div class="param-col-title col-${classSuffix}">${title}</div>
            <div class="param-rows-container">
                ${rows}
            </div>
        </div>
    `;
}

function setAuditFilter(filter) {
    State.auditFilter = filter;
    document.querySelectorAll('.audit-filters .control-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`filter-${filter}`).classList.add('active');
    filterCaseList();
}

function filterCaseList() {
    const query = (document.getElementById('audit-search-input')?.value || '').toLowerCase();
    const filter = State.auditFilter;
    const cards = document.querySelectorAll('.case-card');

    cards.forEach(card => {
        const caseId = (card.querySelector('.case-id-link')?.textContent || '').toLowerCase();
        const comments = (card.getAttribute('data-comments') || '');
        const isPerfect = (card.getAttribute('data-perfect') === 'true');
        const isMarkdown = (card.getAttribute('data-markdown') === 'true');

        const matchesQuery = caseId.includes(query) || comments.includes(query);
        let matchesFilter = true;

        if (filter === 'perfect') {
            matchesFilter = isPerfect;
        } else if (filter === 'markdowns') {
            matchesFilter = isMarkdown;
        } else {
            // 'all' filter - no restriction on perfect/markdown
            matchesFilter = true;
        }

        card.style.display = (matchesQuery && matchesFilter) ? 'block' : 'none';
    });
}

function toggleCaseDetails(index) {
    const el = document.getElementById(`details-${index}`);
    if (el) {
        const isActive = el.classList.contains('active');
        // Close all others maybe? No, let's allow multiple open.
        el.classList.toggle('active');
    }
}

function copyToClipboard(text, message = 'Case ID copied to clipboard') {
    navigator.clipboard.writeText(text).then(() => {
        const feedback = document.createElement('div');
        feedback.style.position = 'fixed';
        feedback.style.bottom = '20px';
        feedback.style.left = '50%';
        feedback.style.transform = 'translateX(-50%)';
        feedback.style.background = 'rgba(0,0,0,0.8)';
        feedback.style.color = 'white';
        feedback.style.padding = '8px 16px';
        feedback.style.borderRadius = '20px';
        feedback.style.fontSize = '12px';
        feedback.style.zIndex = '10000';
        feedback.textContent = message;
        document.body.appendChild(feedback);
        setTimeout(() => feedback.remove(), 2000);
    });
}

function copyMarkdownSummary(index) {
    const data = State.filteredData;
    if (!data || !data.caseLog[index]) return;
    const c = data.caseLog[index];

    let summary = `🚨 *Audit Feedback: Case ${c.caseId}* (${c.reviewDate})\n\n`;

    // Scores
    summary += `*Scores:*\n`;
    summary += `• Customer: ${parseScore(c.customer).toFixed(1)}%\n`;
    summary += `• Business: ${parseScore(c.business).toFixed(1)}%\n`;
    summary += `• Compliance: ${parseScore(c.compliance).toFixed(1)}%\n\n`;

    // Markdowns
    let markdowns = [];
    for (const cat in c.details) {
        for (const p in c.details[cat]) {
            const val = String(c.details[cat][p]).toLowerCase();
            if (val === 'no' || val === '0' || val === 'fail') {
                markdowns.push(`- [${cat.toUpperCase()}] ${p.replace(/_/g, ' ')}`);
            }
        }
    }

    if (markdowns.length > 0) {
        summary += `*Opportunities:*\n${markdowns.join('\n')}\n\n`;
    } else {
        summary += `*Perfect Audit!* No markdowns identified.\n\n`;
    }

    summary += `*Comments:* \n"${c.comments || 'No comments'}"`;

    copyToClipboard(summary, 'Markdown summary copied for coaching!');
}

function renderPremiumScoreCard(title, score, target) {
    const s = Number(score) || 0;
    const t = Number(target) || 0;
    const isPass = s >= t;
    return `
        <div class="card">
            <div class="card-title">${title}</div>
            <div class="score-value" style="color: ${isPass ? 'var(--apple-green)' : 'var(--apple-red)'}">${s.toFixed(1)}%</div>
            <div class="trend-badge ${isPass ? 'trend-up' : 'trend-down'}">
                <i class="ph ${isPass ? 'ph-check-circle' : 'ph-warning'}"></i>
                Target: ${t}%
            </div>
        </div>
    `;
}

function renderTopOpportunities(groupedParams) {
    // Flatten all parameters and filter out those without scores or with 100%
    const allParams = [];
    for (const cat in groupedParams) {
        groupedParams[cat].forEach(p => {
            if (p.score !== null && p.score < 100) {
                allParams.push({ ...p, category: cat });
            }
        });
    }

    // Sort by score ascending
    allParams.sort((a, b) => a.score - b.score);
    const top3 = allParams.slice(0, 3);

    if (top3.length === 0) return '';

    const tips = {
        'LISTENING': 'Active listening and acknowledging customer concerns reduces dead air.',
        'PROBING': 'Ask open-ended questions to uncover the root cause faster.',
        'COMPLETE_RESOLUTION': 'Verify all customer issues are addressed before closing.',
        'TROUBLESHOOTING': 'Follow the standard logic and double-check prerequisites.',
        'EMPATHY': 'Acknowledge the customer\'s feelings to build rapport.',
        'OWNERSHIP': 'Reassure the customer that you are handling their issue.',
        'CONSULTS_ESCALATIONS': 'Check internal KB before consulting to save time.',
        'AUTHENTICATION': 'Ensure strict adherence to verification protocols.',
        'GOOGLE_ONLY_INFO': 'Sensitive data must never be shared externally.'
    };

    const oppCards = top3.map(o => `
        <div class="opportunity-card">
            <div class="opp-header">
                <span class="opp-cat">${o.category}</span>
                <span class="opp-score">${o.score.toFixed(0)}%</span>
            </div>
            <div class="opp-name">${o.name.replace(/_/g, ' ')}</div>
            <div class="opp-tip">
                <strong>Tip:</strong> ${tips[o.name] || 'Review the quality guidelines for this parameter to improve accuracy.'}
            </div>
        </div>
    `).join('');

    return `
        <div class="card grid-span-4" style="background: rgba(255, 149, 0, 0.05); border-color: rgba(255, 149, 0, 0.2);">
            <div class="card-title" style="color: var(--apple-orange); display: flex; align-items: center; gap: 8px;">
                <i class="ph-fill ph-lightbulb"></i> Top Opportunities & Coaching Tips
            </div>
            <div class="opportunities-grid">
                ${oppCards}
            </div>
        </div>
    `;
}

function renderParamGroup(title, params) {
    return `
        <div class="param-group">
            <div class="param-group-title">${title}</div>
            <div class="param-list">
                ${params.map(p => {
                    const hasData = p.score !== null && !isNaN(p.score);
                    const score = hasData ? Number(p.score) : 0;
                    const scoreDisplay = hasData ? score.toFixed(0) + '%' : '—';

                    let barColor = 'var(--apple-light-gray)';
                    let textColor = 'var(--text-primary)';
                    let weight = '500';

                    if (hasData) {
                        if (score >= 95) barColor = 'var(--apple-green)';
                        else if (score >= 90) barColor = 'var(--apple-blue)';
                        else if (score > 0) barColor = 'var(--apple-orange)';
                        else {
                            barColor = 'var(--apple-red)';
                            textColor = 'var(--apple-red)';
                            weight = '700';
                        }
                    } else {
                        textColor = 'var(--text-secondary)';
                    }

                    return `
                        <div class="param-item" style="${!hasData ? 'opacity: 0.5;' : ''}">
                            <div class="param-info">
                                <span class="param-name" style="color: ${hasData ? textColor : 'var(--text-secondary)'}; font-weight: ${weight}">${p.name.replace(/_/g, ' ')}</span>
                                <span class="param-score" style="color: ${hasData ? textColor : 'var(--text-secondary)'}; font-weight: 700">${hasData ? scoreDisplay : 'N/A'}</span>
                            </div>
                            <div class="param-progress-bg">
                                <div class="param-progress-fill" style="width: ${hasData ? score : 0}%; background: ${hasData ? barColor : 'var(--apple-light-gray)'}"></div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `;
}

function toggleTrendView(view) {
    State.trendView = view;
    renderAgentView();
}

function renderCharts(data) {
    const s = data.stats;
    if (!s) return;

    const chartOptions = {
        chart: {
            height: 350,
            toolbar: { show: false },
            fontFamily: 'Inter, -apple-system, sans-serif',
            animations: { enabled: true, easing: 'easeinout', speed: 800 }
        },
        dataLabels: { enabled: false },
        stroke: { curve: 'smooth', width: 3, lineCap: 'round' },
        grid: { borderColor: 'rgba(0,0,0,0.05)', strokeDashArray: 4 },
        xaxis: {
            axisBorder: { show: false },
            axisTicks: { show: false },
            labels: { style: { colors: '#86868B' } }
        },
        yaxis: { labels: { style: { colors: '#86868B' } }, min: 0, max: 100 },
        tooltip: { theme: 'light', x: { show: false } }
    };

    // Trends
    const trendsEl = document.querySelector("#chart-trends");
    const trendData = (State.trendView === 'daily') ? data.trends.daily : data.trends.weekly;

    if (trendsEl && trendData && trendData.length > 0) {
        const targets = s.targets || { CUSTOMER: 95, BUSINESS: 90, COMPLIANCE: 99.5 };
        new ApexCharts(trendsEl, {
            ...chartOptions,
            series: [
                { name: 'Customer', data: trendData.map(d => Number(d.customer || 0).toFixed(1)) },
                { name: 'Business', data: trendData.map(d => Number(d.business || 0).toFixed(1)) },
                { name: 'Compliance', data: trendData.map(d => Number(d.compliance || 0).toFixed(1)) }
            ],
            chart: { ...chartOptions.chart, type: 'area' },
            colors: ['#007AFF', '#34C759', '#FF3B30'],
            xaxis: { ...chartOptions.xaxis, categories: trendData.map(d => d.label) },
            annotations: {
                yaxis: [
                    { y: targets.CUSTOMER, borderColor: '#007AFF', label: { text: 'Cust Target', style: { color: '#fff', background: '#007AFF' } } },
                    { y: targets.BUSINESS, borderColor: '#34C759', label: { text: 'Bus Target', style: { color: '#fff', background: '#34C759' } } },
                    { y: targets.COMPLIANCE, borderColor: '#FF3B30', label: { text: 'Comp Target', style: { color: '#fff', background: '#FF3B30' } } }
                ]
            },
            fill: {
                type: 'gradient',
                gradient: {
                    shadeIntensity: 1,
                    opacityFrom: 0.3,
                    opacityTo: 0.05,
                    stops: [0, 90, 100]
                }
            }
        }).render();
    }

    // Radar
    const radarEl = document.querySelector("#chart-radar");
    if (radarEl) {
        const targets = s.targets || { CUSTOMER: 95, BUSINESS: 90, COMPLIANCE: 99.5 };
        new ApexCharts(radarEl, {
            ...chartOptions,
            series: [
                {
                    name: 'Current',
                    data: [
                        Number(s.customer || 0).toFixed(1),
                        Number(s.business || 0).toFixed(1),
                        Number(s.compliance || 0).toFixed(1)
                    ]
                },
                {
                    name: 'Target',
                    data: [targets.CUSTOMER, targets.BUSINESS, targets.COMPLIANCE]
                }
            ],
            chart: {
                ...chartOptions.chart,
                type: 'radar',
                height: 350,
                dropShadow: { enabled: true, blur: 8, left: 1, top: 1, opacity: 0.1 }
            },
            plotOptions: {
                radar: {
                    polygons: {
                        strokeColors: 'rgba(0,0,0,0.05)',
                        connectorColors: 'rgba(0,0,0,0.05)',
                        fill: { colors: ['#fcfcfc', '#fff'] }
                    }
                }
            },
            xaxis: {
                categories: ['Customer', 'Business', 'Compliance'],
                labels: { style: { colors: '#86868B', fontWeight: 600 } }
            },
            yaxis: { show: false, min: 0, max: 100 },
            colors: ['#007AFF', '#34C759'],
            fill: { opacity: [0.35, 0.1] },
            stroke: { show: true, width: 2 },
            markers: { size: 0, hover: { size: 6 } },
            legend: { position: 'bottom', horizontalAlign: 'center', offsetY: 10 }
        }).render();
    }
}

function renderTeamView() {
    const data = State.filteredData;
    const container = document.getElementById('view-content');
    if (!container) return;

    if (!data || !data.hasData) {
      container.innerHTML = `
        <div class="card grid-span-4" style="text-align:center; padding: 80px;">
          <i class="ph ph-mask-sad" style="font-size: 64px; color: var(--apple-gray); margin-bottom: 20px; display:block;"></i>
          <div style="font-size: 20px; font-weight: 700;">No Team Data Found</div>
          <div style="color: var(--text-secondary); margin-top: 8px;">Check selectors or ensure audits exist for ${State.selectedSup}</div>
        </div>
      `;
      return;
    }

    const s = data.stats;
    const avg = ((s.customer || 0) + (s.business || 0) + (s.compliance || 0)) / 3;
    container.innerHTML = `
        ${renderPremiumScoreCard('Customer', s.customer || 0, s.targets.CUSTOMER)}
        ${renderPremiumScoreCard('Business', s.business || 0, s.targets.BUSINESS)}
        ${renderPremiumScoreCard('Compliance', s.compliance || 0, s.targets.COMPLIANCE)}
        <div class="card">${renderMiniStat('Team Avg', Number(avg || 0).toFixed(1) + '%')}</div>

        <div class="card">
            <div class="card-title">Team Distribution</div>
            <div id="chart-radar" style="height: 350px;"></div>
        </div>
        <div class="card grid-span-3">
            <div class="card-title">Team Performance Trends</div>
            <div id="chart-trends" style="height: 350px;"></div>
        </div>

        <div class="card grid-span-4">
            <div class="card-title">Agent Rankings</div>
            <div class="ranking-list">
                ${data.agents.map((a, i) => {
                    const agentAvg = ((Number(a.stats.customer) || 0) + (Number(a.stats.business) || 0) + (Number(a.stats.compliance) || 0)) / 3;
                    return `
                        <div class="ranking-item">
                            <div class="rank-num">${i+1}</div>
                            <div class="rank-ldap">${a.ldap}</div>
                            <div class="rank-bar-bg"><div class="rank-bar-fill" style="width: ${agentAvg}%"></div></div>
                            <div class="rank-score">${agentAvg.toFixed(1)}%</div>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `;
    renderCharts(data);
}

function renderClusterView() {
    const data = State.filteredData;
    const container = document.getElementById('view-content');
    if (!container) return;

    if (!data || !data.hasData) {
      container.innerHTML = `<div class="card grid-span-4" style="text-align:center; padding: 80px;">No Cluster Data Found</div>`;
      return;
    }

    const s = data.stats;
    container.innerHTML = `
        <div class="card grid-span-4" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
            ${renderMiniStat('Cust. Avg', Number(s.customer || 0).toFixed(1) + '%')}
            ${renderMiniStat('Bus. Avg', Number(s.business || 0).toFixed(1) + '%')}
            ${renderMiniStat('Comp. Avg', Number(s.compliance || 0).toFixed(1) + '%')}
            ${renderMiniStat('Total Audits', s.count || 0)}
        </div>

        <div class="card">
            <div class="card-title">Cluster Distribution</div>
            <div id="chart-radar" style="height: 350px;"></div>
        </div>
        <div class="card grid-span-3">
            <div class="card-title">Cluster Performance Trends</div>
            <div id="chart-trends" style="height: 350px;"></div>
        </div>

        <div class="card grid-span-4">
            <div class="card-title">Supervisor Rankings</div>
            <div class="ranking-list">
                ${data.supervisors.map((sup, i) => {
                    const supAvg = ((Number(sup.stats.customer) || 0) + (Number(sup.stats.business) || 0) + (Number(sup.stats.compliance) || 0)) / 3;
                    return `
                        <div class="ranking-item">
                            <div class="rank-num">${i+1}</div>
                            <div class="rank-ldap" style="width: 200px;">${sup.name}</div>
                            <div class="rank-bar-bg"><div class="rank-bar-fill" style="width: ${supAvg}%; background: var(--apple-blue);"></div></div>
                            <div class="rank-score">${supAvg.toFixed(1)}%</div>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `;
    renderCharts(data);
}

function renderMiniStat(label, val) {
    return `
        <div style="text-align:center;">
            <div style="font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; margin-bottom:8px;">${label}</div>
            <div style="font-size:24px; font-weight:800;">${val}</div>
        </div>
    `;
}

// Helpers
function callServer(method, args = []) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      [method](...args);
  });
}

function showLoader(show) {
  const loader = document.getElementById('app-loader');
  if (loader) loader.style.display = show ? 'flex' : 'none';
}

function switchTab(tab) {
  State.currentTab = tab;

  // Sidebar UI
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const activeNav = document.getElementById(`nav-${tab}`);
  if (activeNav) activeNav.classList.add('active');

  // Header UI
  const title = document.getElementById('page-title');
  const subtitle = document.getElementById('page-subtitle');
  if (tab === 'agent') {
      title.textContent = 'Agent Performance';
      subtitle.textContent = 'Personal Quality Score Overview';
  } else if (tab === 'team') {
      title.textContent = 'Team Rankings';
      subtitle.textContent = 'Supervisor Group Performance';
  } else {
      title.textContent = 'Cluster Overview';
      subtitle.textContent = 'Manager Level Aggregations';
  }

  // Selectors visibility
  const selAgent = document.getElementById('selector-agent');
  const selTeam = document.getElementById('selector-team');
  const selCluster = document.getElementById('selector-cluster');

  if (selAgent) selAgent.style.display = tab === 'agent' ? 'grid' : 'none';
  if (selTeam) selTeam.style.display = tab === 'team' ? 'grid' : 'none';
  if (selCluster) selCluster.style.display = tab === 'cluster' ? 'grid' : 'none';

  fetchData();
}

function forceRefresh() {
  const btn = document.querySelector('.refresh-btn');
  if (btn) btn.classList.add('spinning');

  // Clear frontend session cache first
  try { sessionStorage.removeItem('q_initial_data'); } catch(e) {}

  initApp(true).finally(() => {
    if (btn) btn.classList.remove('spinning');
  });
}
</script>
